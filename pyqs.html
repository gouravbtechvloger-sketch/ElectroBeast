<script>
        // ✅ CORRECT GEMINI API CONFIGURATION
        const GEMINI_API_KEY = "AIzaSyBw4Sh-PsEsBuhI82EG5ZiFSsNo91Bz2gA"; // Aapki nayi key
        const GEMINI_MODEL = "gemini-1.5-flash";  // ✅ Updated to faster model
        
        // Topics Data
        const topicsData = {
            "Signals & Systems": {
                1: ["Signal Classification", "Continuous & Discrete Signals", "Even & Odd Signals", "Periodic & Aperiodic Signals", "Energy & Power Signals"],
                2: ["Fourier Series", "Fourier Transform", "Properties of FT", "DTFT", "Sampling Theorem"],
                3: ["Laplace Transform", "ROC", "Properties of Laplace", "Inverse Laplace", "System Analysis"],
                4: ["Z-Transform", "ROC of Z-Transform", "Properties", "Inverse Z-Transform"],
                5: ["State Space Analysis", "Controllability", "Observability"]
            },
            "Analog Circuits": {
                1: ["Op-Amp Basics", "Ideal Op-Amp", "Inverting Amplifier", "Non-Inverting Amplifier", "Voltage Follower"],
                2: ["Summing Amplifier", "Integrator", "Differentiator", "Instrumentation Amplifier"],
                3: ["Active Filters", "Low Pass Filter", "High Pass Filter", "Band Pass Filter"],
                4: ["Schmitt Trigger", "Astable Multivibrator", "Monostable Multivibrator", "555 Timer"],
                5: ["Voltage Regulators", "Series Regulator", "LM317", "Switching Regulators"]
            },
            "Electronic Devices": {
                1: ["PN Junction Diode", "V-I Characteristics", "Diode Equation", "Zener Diode", "Rectifiers"],
                2: ["BJT", "Transistor Configurations", "Biasing Circuits", "JFET", "MOSFET Basics"],
                3: ["MOSFET", "CMOS Inverter", "Small Signal Model", "Frequency Response"],
                4: ["Amplifiers", "Common Emitter", "Common Base", "Common Collector"],
                5: ["Feedback Amplifiers", "Oscillators", "Barkhausen Criterion", "RC Oscillators"]
            },
            "Control Systems": {
                1: ["Open Loop Control", "Closed Loop Control", "Transfer Function", "Block Diagram Reduction"],
                2: ["Time Response", "First Order System", "Second Order System", "Steady State Error"],
                3: ["Root Locus", "Root Locus Rules", "Stability Analysis"],
                4: ["Bode Plot", "Polar Plot", "Nyquist Stability", "Gain Margin"],
                5: ["State Space Analysis", "Controllability", "Observability", "PID Controllers"]
            },
            "Analog Communication": {
                1: ["AM Modulation", "Modulation Index", "DSB-SC", "SSB-SC", "AM Demodulation"],
                2: ["FM Modulation", "PM Modulation", "Narrowband FM", "Wideband FM", "FM Demodulation"],
                3: ["Noise in Communication", "SNR", "Noise Figure", "Figure of Merit"],
                4: ["Superheterodyne Receiver", "TRF Receiver", "AGC", "AFC"],
                5: ["Pulse Modulation", "PAM", "PWM", "PPM", "PCM"]
            },
            "Mathematics-III": {
                1: ["Laplace Transform", "Properties of Laplace", "Inverse Laplace", "Convolution Theorem"],
                2: ["Fourier Series", "Even & Odd Functions", "Half Range Series", "Fourier Transform"],
                3: ["Analytic Functions", "Cauchy-Riemann Equations", "Cauchy's Integral Theorem"],
                4: ["Gradient", "Divergence", "Curl", "Stokes Theorem", "Gauss Theorem"],
                5: ["Random Variables", "Probability Distributions", "Mean & Variance", "Correlation"]
            }
        };

        let currentOpenUnit = null;

        function toggleUnit(unitId) {
            const list = document.getElementById(`topics-${unitId}`);
            if (currentOpenUnit === unitId) {
                list.classList.remove('open');
                currentOpenUnit = null;
            } else {
                if (currentOpenUnit) {
                    document.getElementById(`topics-${currentOpenUnit}`).classList.remove('open');
                }
                list.classList.add('open');
                currentOpenUnit = unitId;
            }
        }

        async function getAIAnswer(topic) {
            const modal = document.getElementById('answerModal');
            const modalContent = document.getElementById('modalContent');
            const modalTitle = document.getElementById('modalTitle');
            
            modalTitle.innerHTML = `🤖 AI: ${topic}`;
            modalContent.innerHTML = `<div class="loading"><i class="fas fa-spinner"></i><p>Calling Gemini AI...</p></div>`;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            const prompt = `You are an RGPV Electronics Engineering professor. Explain "${topic}" in detail for B.Tech exam. Include definition, important formulas, key points, and applications. Keep it concise but exam-focused.`;
            
            try {
                // ✅ Fetch call with updated model
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 1000 }
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    modalContent.innerHTML = `
                        <div class="error">
                            <strong>⚠️ API Error:</strong> ${data.error.message || "Unknown error"}<br><br>
                            <strong>Fix:</strong> API limit reached or key is invalid.
                        </div>
                        <div class="answer" style="margin-top: 20px;">
                            <strong>📚 Quick Answer for ${topic}:</strong><br><br>
                            This topic is important for RGPV exams. Focus on understanding the basic concepts, 
                            practicing numerical problems, and reviewing previous year questions.
                        </div>
                    `;
                    return;
                }
                
                let answer = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!answer) {
                    throw new Error("No response from AI");
                }
                
                answer = answer.replace(/\n/g, '<br>');
                answer = answer.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                modalContent.innerHTML = `<div class="answer">${answer}</div>`;
                
            } catch (error) {
                modalContent.innerHTML = `
                    <div class="error">
                        <strong>⚠️ Error:</strong> ${error.message}<br><br>
                        <strong>💡 Tip:</strong> Please check your internet connection.
                    </div>
                `;
            }
        }

        let currentSubject = "";
        
        function askAI(topic, subject) {
            currentSubject = subject;
            getAIAnswer(topic);
        }
        
        function closeModal() {
            document.getElementById('answerModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        function renderSubjects(semester) {
            const subjects = semester === 3 ? 
                ["Signals & Systems", "Analog Circuits", "Electronic Devices", "Mathematics-III"] :
                ["Signals & Systems", "Analog Circuits", "Control Systems", "Analog Communication"];
            
            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '';
            
            subjects.forEach(subject => {
                const unitsData = topicsData[subject] || {};
                let unitsHtml = '';
                
                for (let u = 1; u <= 5; u++) {
                    const topics = unitsData[u] || [`Unit ${u} topics coming soon`];
                    const unitId = `${subject.replace(/\s/g, '')}-${u}`;
                    
                    const topicsHtml = topics.map(topic => `
                        <div class="topic-item">
                            <span>📌 ${topic}</span>
                            <button class="ai-btn" onclick="askAI('${topic.replace(/'/g, "\\'")}', '${subject}')">
                                <i class="fas fa-robot"></i> Get Answer
                            </button>
                        </div>
                    `).join('');
                    
                    unitsHtml += `
                        <button class="unit-btn" onclick="toggleUnit('${unitId}')">
                            <span>Unit ${u}</span>
                            <span>▼</span>
                        </button>
                        <div id="topics-${unitId}" class="topic-list">
                            ${topicsHtml}
                        </div>
                    `;
                }
                
                container.innerHTML += `
                    <div class="subject-card">
                        <h3>${subject}</h3>
                        ${unitsHtml}
                    </div>
                `;
            });
        }
        
        function switchSemester(sem) {
            document.querySelectorAll('.sem-btn').forEach((btn, i) => {
                if ((sem === 3 && i === 0) || (sem === 4 && i === 1)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderSubjects(sem);
        }
        
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
        }
        
        renderSubjects(3);
        
        window.onclick = function(event) {
            const modal = document.getElementById('answerModal');
            if (event.target === modal) closeModal();
        }
    </script>
